{% load civil_extras %}

<!-- ================= DEPARTMENTS ================= -->
<h3 onclick="toggleSection(this)" class="section-title-modern">
  <span class="flex items-center gap-2">
    🏢 <span>Other Departments</span>
  </span>
  <select id="deptSelect">
  <option value="">+ Select Department</option>

  {% for d in other_depts %}
  <option 
    value="{{ d.id }}"
    data-rate="{{ default_rates|get_item:d.id|default:0 }}">
    {{ d.name }}
  </option>
  {% endfor %}

  </select>
</h3>

<div class="table-card-modern dept-wrapper">

  <!-- ===== HEADER ===== -->
  <div class="table-head-modern"
       style="grid-template-columns:
       minmax(200px,1.6fr)
       repeat(2,minmax(70px,.8fr))
       minmax(90px,.9fr)
       minmax(100px,1fr)
       minmax(110px,1fr)
       minmax(110px,1fr);">

    <div>Department</div>
    <div class="text-center">Full</div>
    <div class="text-center">Half</div>
    <div class="text-center">Rate</div>
    <div class="text-center">Advance</div>
    <div class="text-center">Labour</div>
    <div class="text-center">Total</div>
  </div>

  <!-- ===== BODY ===== -->
  <div id="deptBody" class="table-body-modern">

{% for id,row in dept_map.items %}
{% with dept=row.department %}

<div id="dept_row_{{ dept.id }}" class="table-row-modern dept-row"
style="grid-template-columns:
minmax(200px,1.6fr)
repeat(2,minmax(70px,.8fr))
minmax(90px,.9fr)
minmax(100px,1fr)
minmax(110px,1fr)
minmax(110px,1fr);">

<div class="font-semibold">{{ dept.name }}</div>

<input name="dept_full_{{ dept.id }}"
value="{{ row.full_day_count|default:0 }}"
class="table-input-modern money"
oninput="calcDept({{ dept.id }})">

<input name="dept_half_{{ dept.id }}"
value="{{ row.half_day_count|default:0 }}"
class="table-input-modern money"
oninput="calcDept({{ dept.id }})">

<input name="dept_rate_{{ dept.id }}"
value="{{ row.full_day_rate }}"
class="table-input-modern money rate-highlight"
oninput="calcDept({{ dept.id }})">

<input name="dept_advance_{{ dept.id }}"
value="{{ row.advance_amount|default:0 }}"
class="table-input-modern money advance-modern"
oninput="calcDept({{ dept.id }})">

<div id="dept_labour_{{ dept.id }}" class="table-box-modern labour-modern">
{{ row.labour_amount }}
</div>

<div id="dept_total_{{ dept.id }}" class="table-box-modern total-modern">
{{ row.total_amount }}
</div>

</div>

{% endwith %}
{% endfor %}

</div>
</div>
<!-- ===== DEPT PREMIUM POLISH ===== -->
<style>
/* ===== DEPT HEADER GLASS ===== */
.dept-header{
  background:linear-gradient(180deg,#fff7ed,#ffffff);
  backdrop-filter:blur(6px);
  box-shadow:0 4px 12px rgba(0,0,0,.04);
}

/* ===== ROW FEEL ===== */
.dept-row{
  transition:all .18s ease;
}

.dept-row:hover{
  background:linear-gradient(to right,#fff7ed,#ffffff);
  transform:scale(1.003);
}

/* ===== RATE FIELD EMPHASIS ===== */
.dept-row input[name^="dept_rate_"]{
  background:linear-gradient(180deg,#fff,#fef3c7);
}
/* ===== DEPT WORK GRID ===== */
.dept-work-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:6px;
}

/* reuse from civil if already exists */
.work-field{
  display:flex;
  flex-direction:column;
  gap:2px;
}

.work-field label{
  font-size:.65rem;
  font-weight:800;
  color:#64748b;
  text-align:center;
}

.work-field input{
  height:28px;
  border:1px solid #d1d5db;
  border-radius:6px;
  text-align:center;
  font-weight:700;
  font-size:.8rem;
}

/* ===== RATE HIGHLIGHT ===== */
.rate-highlight{
  background:linear-gradient(180deg,#fff,#fef3c7);
}

/* ===== ROW HOVER PREMIUM ===== */
.dept-row:hover{
  background:linear-gradient(to right,#fff7ed,#ffffff);
  transform:scale(1.002);
  transition:.15s ease;
}
/* ===== MOBILE ===== */
@media (max-width:768px){
  .dept-row{
    min-width:760px;
  }
}
</style>

<!-- ===== SAFE TOGGLE HELPER ===== -->
<script>
if (typeof toggleSection === "undefined") {
  function toggleSection(el){
    const card = el.nextElementSibling;
    const arrow = el.querySelector(".section-arrow");

    if (!card) return;

    card.classList.toggle("hidden");

    if (arrow) {
      arrow.style.transform =
        card.classList.contains("hidden") ? "rotate(-90deg)" : "rotate(0deg)";
    }
  }
}
document.getElementById("deptSelect")
.addEventListener("change", addDept);

function addDept(){

  const select = document.getElementById("deptSelect");
  const option = select.options[select.selectedIndex];

  const deptId = option.value;
  const deptName = option.text;
  const rate = option.dataset.rate;

  if(!deptId){
    alert("Select department first");
    return;
  }

  if(document.getElementById("dept_row_"+deptId)){
    alert("Department already added");
    return;
  }

  const container = document.getElementById("deptBody");

  const html = `
  <div id="dept_row_${deptId}" class="table-row-modern dept-row"
  style="grid-template-columns:
  minmax(200px,1.6fr)
  repeat(2,minmax(70px,.8fr))
  minmax(90px,.9fr)
  minmax(100px,1fr)
  minmax(110px,1fr)
  minmax(110px,1fr);">

  <div class="font-semibold">${deptName}</div>

  <input name="dept_full_${deptId}" class="table-input-modern money"
  oninput="calcDept(${deptId})">

  <input name="dept_half_${deptId}" class="table-input-modern money"
  oninput="calcDept(${deptId})">

  <input name="dept_rate_${deptId}" value="${rate}"
  class="table-input-modern money"
  oninput="calcDept(${deptId})">

  <input name="dept_advance_${deptId}" class="table-input-modern money"
  oninput="calcDept(${deptId})">

  <div id="dept_labour_${deptId}" class="table-box-modern labour-modern">0</div>

  <div id="dept_total_${deptId}" class="table-box-modern total-modern">0</div>

  </div>
  `;

  container.insertAdjacentHTML("beforeend", html);

  select.value="";
}
</script>
